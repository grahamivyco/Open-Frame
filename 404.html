<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Open Frame</title>
  <script>
    // GitHub Pages SPA redirect — sends /any/path to index.html so client routing can handle it
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?/' +
      l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
